version: 2
updates:
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: direct
      - dependency-type: indirect
    labels:
      - "dependencies"
    groups:
      rails:
        patterns:
          - "actionpack"
          - "activerecord"
          - "activesupport"
          - "railties"
          - "actionview"
          - "activemodel"
      sidekiq:
        patterns:
          - "sidekiq*"
      faraday:
        patterns:
          - "faraday*"
    open-pull-requests-limit: 10
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
